<hr>

<form method="post">
    <div class="form-horizontal">
        <div class="form-group">
            <label class="control-label col-md-2">Заголовок</label>
            <div class="col-md-10"><input name="title" value="{{ item.title }}" class="form-control" maxlength="127"/></div>
        </div>
        <div class="form-group">
            <label class="control-label col-md-2">Описание</label>
            <div class="col-md-10"><textarea name="description" class="form-control" rows="3">{{ item.description }}</textarea></div>
        </div>
        <div class="form-group">
            <label class="control-label col-md-2">Имя компьютера</label>
            <div class="col-md-10"><input name="computer_name" value="{{ item.computer_name }}" class="form-control" /></div>
        </div>
        <div class="form-group">
            <label class="control-label col-md-2">Корпус</label>
            <div class="col-md-10"><input name="building" value="{{ item.building }}" class="form-control" /></div>
        </div>
        <div class="form-group">
            <label class="control-label col-md-2">Кабинет</label>
            <div class="col-md-10"><input name="room" value="{{ item.room }}" class="form-control" /></div>
        </div>
        <div class="form-group">
            <label class="control-label col-md-2">Телефон</label>
            <div class="col-md-10"><input name="phone" value="{{ item.phone }}" class="form-control" /></div>
        </div>

        {% if user.role == 'admin' %}
        <div class="form-group">
            <label class="control-label col-md-2">Статус</label>
            <div class="col-md-10">
                <select name="status" class="form-control">
                    <option {% if item.status == 'Новая' %}selected{% endif %}>Новая</option>
                    <option {% if item.status == 'В работе' %}selected{% endif %}>В работе</option>
                    <option {% if item.status == 'Закрыта' %}selected{% endif %}>Закрыта</option>
                </select>
            </div>
        </div>   
            {% else %}
                    <div class="form-group">
                    <label class="control-label col-md-2">Статус</label>
                    <div class="col-md-10">
                    <select name="status" class="form-control">
                    <option {% if item.status == 'Новая' %}selected{% endif %}>Новая</option>
                </select>
            </div>
        </div>  

        {% endif %}

        <input type="hidden" name="author" value="{{ item.author }}">
        <input type="hidden" name="action" value="save">
        <div class="form-group">
            <div class="col-md-offset-2 col-md-10">
                <input type="submit" value="Сохранить" class="btn btn-primary" />
            </div>
        </div>
    </div>
</form>
